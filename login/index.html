<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Dashboard Login — L Tork Controls</title>
		<meta
			name="description"
			content="Login to L Tork Controls admin dashboard. Authorised personnel only."
		/>
		<meta name="robots" content="noindex, nofollow" />
		<link rel="canonical" href="https://www.ltorkcontrols.com/login" />

		<!-- Fonts & Icons -->
		<link
			href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap"
			rel="stylesheet"
		/>
		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
		/>
		<!-- Bootstrap 5 CSS -->
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
			rel="stylesheet"
		/>
		<!-- Custom Stylesheet -->
		<link rel="stylesheet" href="/assets/css/styles.css" />

		<!-- EmailJS Frontend Library CDN -->
		<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
	</head>
	<body>
		<nav id="main-nav"></nav>

		<div id="page-login" class="page">
			<div class="login-box">
				<div class="login-logo">
					<img
						src="/assets/images/logo.png"
						alt="L Tork Controls Logo"
						class="brand-logo-img"
					width="450"
					height="300"
						style="margin: 0 auto 1rem; height: 56px"
						onerror="
							this.style.display = 'none'
							this.nextElementSibling.style.display = 'inline'
						"
					/>
					<span style="display: none">L Tork <span>Controls</span></span>
				</div>
				<h1 class="sr-only">L Tork Controls - Dashboard Login</h1>
				<div class="login-sub">
					&#128274; Dashboard Login &mdash; Authorised Personnel Only
				</div>
				<div class="login-error" id="login-error">
					&#10060; Incorrect email or password. Please try again.
				</div>
				<div class="field">
					<label>Email Address</label>
					<input
						type="email"
						id="login-email"
						placeholder="infoltorkcontrols@gmail.com"
						autocomplete="username"
					/>
				</div>
				<div class="field">
					<label>Password</label>
					<div class="pw-wrap">
						<input
							type="password"
							id="login-password"
							placeholder="Enter your password"
							autocomplete="current-password"
							onkeydown="if (event.key === 'Enter') doLogin()"
						/>
						<span class="pw-toggle" onclick="togglePw()" id="pw-eye"
							>&#128065;</span
						>
					</div>
				</div>
				<button
					class="btn-primary"
					onclick="doLogin()"
					style="
						width: 100%;
						text-align: center;
						padding: 0.9rem;
						margin-top: 0.5rem;
					"
				>
					Login to Dashboard &rarr;
				</button>

				<a class="login-back" href="/">&larr; Back to Website</a>
			</div>
		</div>

		<div id="alert-modal-container"></div>

		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
		<script src="/assets/js/config.js"></script>
		<script src="/services/api.js"></script>
		<script src="/assets/js/core.js"></script>
		<script src="/assets/js/login.js"></script>

		<script>
			document.getElementById('alert-modal-container').innerHTML = renderAlertModal();
			renderNav('login');
		</script>
	</body>
</html>
